<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Recommendations | Home</title>
    
    <style>
        /* Base Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow-x: hidden;
        }

        /* Task 3: Background Image with Overlay */
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                        url('https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* Task 2: Navbar Styling */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-right: 25px;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #2ecc71;
        }

        .search-container {
            display: flex;
            gap: 10px;
        }

        .search-container input {
            padding: 10px 15px;
            border-radius: 25px;
            border: none;
            outline: none;
            width: 250px;
        }

        .btn-search {
            background-color: #2ecc71;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .btn-search:hover {
            background-color: #27ae60;
        }

        .btn-reset {
            background-color: transparent;
            color: white;
            border: 2px solid white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
        }

        /* Task 3: Home Page Introduction Content */
        .hero-content {
            margin-top: 10%;
            margin-left: 8%;
            max-width: 600px;
        }

        .hero-content h1 {
            font-size: 4.5rem;
            line-height: 1.1;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .hero-content p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        /* Social Media Icons Vertical Sidebar */
        .social-icons {
            position: fixed;
            left: 25px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .social-icons img {
            width: 25px;
            filter: invert(1);
            transition: transform 0.3s;
        }

        .social-icons img:hover {
            transform: scale(1.3);
            filter: invert(1) sepia(1) saturate(5) hue-rotate(90deg); /* Greenish hover */
        }

    </style>
</head>
<body>

    <nav>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="contact.html">Contact Us</a>
        </div>
        <div class="search-container">
            <input type="text" id="conditionInput" placeholder="Enter keyword (beach, temple...)" required>
            <button id="btnSearch" class="btn-search">Search</button>
            <button id="btnClear" class="btn-reset">Reset</button>
        </div>
    </nav>

    <main class="hero-content">
        <h1>Explore <br> Dream <br> Discover</h1>
        <p>
            Welcome to Travel Recommendations. We specialize in finding the world's most 
            hidden gems and iconic landmarks. Start your journey by searching for 
            destinations above.
        </p>
        <button class="btn-search" style="padding: 15px 40px; font-size: 1.1rem;">Learn More</button>
    </main>

    <div class="social-icons">
        <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384063.png" alt="Instagram"></a>
        <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" alt="Twitter"></a>
        <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384053.png" alt="Facebook"></a>
    </div>

    <script>
        const btnSearch = document.getElementById('btnSearch');
        const btnClear = document.getElementById('btnClear');
        const conditionInput = document.getElementById('conditionInput');

        // Redirect search to the recommendations page
        btnSearch.addEventListener('click', () => {
            const keyword = conditionInput.value.trim();
            if (keyword) {
                // This sends the user to the other page with the search term in the URL
                window.location.href = `travel_recommendation.html?search=${encodeURIComponent(keyword)}`;
            } else {
                alert("Please enter a keyword to search!");
            }
        });

        // Clear button resets the local input
        btnClear.addEventListener('click', () => {
            conditionInput.value = '';
        });
    </script>
</body>
</html>
