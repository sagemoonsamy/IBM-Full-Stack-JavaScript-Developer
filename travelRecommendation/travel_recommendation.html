<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobalExplorer | Recommendations</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            color: white; min-height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1920&q=80');
            background-size: cover; background-position: center; background-attachment: fixed;
        }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 8%; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px);
        }

        .nav-links a { color: white; text-decoration: none; margin-right: 25px; font-weight: 500; }
        .search-container input { padding: 10px 15px; border-radius: 20px; border: none; width: 220px; }
        
        button { padding: 10px 20px; border-radius: 20px; border: none; cursor: pointer; font-weight: bold; }
        #btnSearch { background-color: #2ecc71; color: white; margin-left: 10px; }
        #btnClear { background-color: transparent; border: 1px solid white; color: white; margin-left: 5px; }

        #resultsContainer {
            display: flex; flex-wrap: wrap; justify-content: center;
            gap: 30px; padding: 40px 5%;
        }

        .result-card {
            background: rgba(255, 255, 255, 0.98); color: #333;
            width: 350px; border-radius: 15px; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .result-card img { width: 100%; height: 220px; object-fit: cover; }
        .result-info { padding: 20px; }
        .result-info h3 { margin: 0 0 10px 0; color: #2ecc71; }
        
        /* Task 10 Styling */
        .time-display { 
            font-size: 0.9rem; color: #666; 
            background: #f0f0f0; padding: 5px 10px; 
            border-radius: 5px; display: inline-block; margin-bottom: 15px;
        }

        .btn-visit { background: #2ecc71; color: white; margin-top: 10px; width: 100%; }
        .error-msg { background: rgba(0,0,0,0.5); padding: 20px; border-radius: 10px; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="contact.html">Contact Us</a>
        </div>
        <div class="search-container">
            <input type="text" id="conditionInput" placeholder="Enter keyword...">
            <button id="btnSearch">Search</button>
            <button id="btnClear">Reset</button>
        </div>
    </nav>

    <div id="resultsContainer"></div>

    <script src="travel_recommendation.js"></script>
</body>
</html>
